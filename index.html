
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ストック管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #fdf2f8;
  --bg-tertiary: #ffffff;
  --text-primary: #4a2040;
  --text-secondary: #9b6b8a;
  --text-tertiary: #c4a0b5;
  --border: rgba(219,112,165,0.18);
  --border-hover: rgba(219,112,165,0.35);
  --accent: #e88cb5;
  --accent-light: #f9d5e5;
  --radius: 12px;
  --radius-lg: 16px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #2d1f2b;
    --bg-secondary: #3a2838;
    --bg-tertiary: #231a22;
    --text-primary: #f5dce8;
    --text-secondary: #c9a0b8;
    --text-tertiary: #8a6a7e;
    --border: rgba(233,160,195,0.18);
    --border-hover: rgba(233,160,195,0.3);
    --accent: #e88cb5;
    --accent-light: #5a3050;
  }
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
  background: var(--bg-tertiary);
  color: var(--text-primary);
  min-height: 100dvh;
}
.app {
  max-width: 480px;
  margin: 0 auto;
  padding: 12px 16px 80px;
}
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0 16px;
}
.header h1 {
  font-size: 20px;
  font-weight: 600;
}
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
  background: #e0f2fc;
  border-radius: var(--radius);
  padding: 3px;
}
.tab {
  flex: 1;
  text-align: center;
  padding: 9px 4px;
  font-size: 13px;
  font-weight: 600;
  border: none;
  background: none;
  color: var(--text-secondary);
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.15s;
}
.tab.active {
  background: var(--bg-primary);
  color: #d4699b;
  box-shadow: 0 1px 4px rgba(219,112,165,0.15);
}
.category-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
  margin: 14px 0 6px;
  padding-left: 2px;
}
.item-card {
  background: var(--bg-primary);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 12px 14px;
  margin-bottom: 8px;
}
.item-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.item-name {
  font-size: 15px;
  font-weight: 600;
}
.item-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 99px;
  font-weight: 600;
}
.badge-plenty { background: #e8f5e9; color: #558b5e; }
.badge-ok { background: #e3f0fc; color: #5a8abf; }
.badge-low { background: #fff3e0; color: #c48840; }
.badge-out { background: #fce4ec; color: #c25572; }
@media (prefers-color-scheme: dark) {
  .badge-plenty { background: #2e4a30; color: #a8d5a0; }
  .badge-ok { background: #253a50; color: #90bde0; }
  .badge-low { background: #4a3520; color: #e8b870; }
  .badge-out { background: #4a2030; color: #e8a0b5; }
}
.item-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}
.qty-display {
  flex: 1;
  display: flex;
  align-items: baseline;
  gap: 6px;
}
.qty-num {
  font-size: 22px;
  font-weight: 600;
}
.qty-unit {
  font-size: 13px;
  color: var(--text-secondary);
}
.qty-sub {
  font-size: 11px;
  color: var(--text-tertiary);
}
.btn-round {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 0.5px solid var(--border-hover);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.btn-round:active {
  transform: scale(0.9);
  background: var(--bg-secondary);
}
.pkg-btn {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 99px;
  border: 0.5px solid var(--border-hover);
  background: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-weight: 600;
  -webkit-tap-highlight-color: transparent;
}
.pkg-btn:active { background: var(--bg-secondary); }
.bar-track {
  height: 6px;
  background: var(--bg-secondary);
  border-radius: 3px;
  flex: 1;
  margin: 0 4px;
}
.bar-fill {
  height: 6px;
  border-radius: 3px;
  transition: width 0.3s;
}
.item-price {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
  font-size: 12px;
  color: var(--text-secondary);
}
.item-price span { font-weight: 600; }
.buy-btn {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 99px;
  border: 0.5px solid var(--accent);
  background: var(--accent-light);
  color: #d4699b;
  cursor: pointer;
  font-weight: 600;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  align-items: center;
  gap: 3px;
}
.buy-btn:active { opacity: 0.8; }
.buy-modal {
  background: var(--bg-primary);
  border: 0.5px solid var(--border-hover);
  border-radius: var(--radius-lg);
  padding: 12px 14px;
  margin-top: 8px;
}
.buy-modal .field { margin-bottom: 8px; }
.buy-modal .field label { font-size: 11px; }
.buy-preview {
  font-size: 13px;
  color: var(--text-secondary);
  padding: 6px 0;
}
.buy-preview strong { color: var(--text-primary); }
.buy-actions { display: flex; gap: 6px; margin-top: 8px; }
.buy-actions button {
  flex: 1;
  padding: 8px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.bar-row {
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.bar-pct {
  font-size: 11px;
  color: var(--text-tertiary);
  min-width: 30px;
  text-align: right;
}
.add-btn {
  width: 100%;
  margin-top: 16px;
  padding: 12px;
  border: 1.5px dashed var(--border-hover);
  border-radius: var(--radius-lg);
  background: none;
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  -webkit-tap-highlight-color: transparent;
}
.add-btn:active { background: var(--bg-secondary); }
.delete-btn {
  border: none;
  background: none;
  color: var(--text-tertiary);
  cursor: pointer;
  font-size: 16px;
  padding: 4px;
  -webkit-tap-highlight-color: transparent;
}
.shopping-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: var(--bg-primary);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 6px;
}
.si-icon { font-size: 18px; }
.si-icon-warn { color: #e8a050; }
.si-icon-danger { color: #e07090; }
@media (prefers-color-scheme: dark) {
  .si-icon-warn { color: #e8b870; }
  .si-icon-danger { color: #e8a0b5; }
}
.si-name {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
}
.si-note {
  font-size: 12px;
  color: var(--text-secondary);
}
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-tertiary);
  font-size: 14px;
}
.empty-state i { font-size: 32px; display: block; margin-bottom: 8px; }

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 60px;
  z-index: 100;
  animation: fadeIn 0.15s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--bg-primary);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  width: 92%;
  max-width: 400px;
  max-height: 85vh;
  overflow-y: auto;
}
.modal h2 {
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 16px;
}
.field { margin-bottom: 12px; }
.field label {
  display: block;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 4px;
  font-weight: 600;
}
.field input, .field select {
  width: 100%;
  padding: 8px 10px;
  border: 0.5px solid var(--border-hover);
  border-radius: var(--radius);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 14px;
  outline: none;
}
.field input:focus, .field select:focus {
  border-color: #e88cb5;
  box-shadow: 0 0 0 2px rgba(232,140,181,0.2);
}
.field-row { display: flex; gap: 8px; }
.field-row .field { flex: 1; }
.modal-actions {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}
.modal-actions button {
  flex: 1;
  padding: 11px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.btn-cancel {
  background: none;
  border: 0.5px solid var(--border-hover);
  color: var(--text-secondary);
}
.btn-save {
  background: #e88cb5;
  border: none;
  color: #fff;
}
.btn-save:active { opacity: 0.85; }
</style>
</head>
<body>

<div class="app" id="app"></div>

<script>
const CATEGORIES = {
  toilet: "トイレ・バス",
  kitchen: "キッチン",
  food: "食品",
  cleaning: "掃除・洗濯",
  other: "その他"
};

const PRESETS = [
  { name: "トイレットペーパー", unit: "ロール", pkgSize: 12, pkgUnit: "パック", category: "toilet", max: 24, price: 0 },
  { name: "ティッシュペーパー", unit: "箱", pkgSize: 5, pkgUnit: "パック", category: "toilet", max: 10, price: 0 },
  { name: "食パン", unit: "枚", pkgSize: 6, pkgUnit: "斤", category: "food", max: 12, price: 0 },
  { name: "キッチンペーパー", unit: "ロール", pkgSize: 4, pkgUnit: "パック", category: "kitchen", max: 8, price: 0 },
  { name: "ラップ", unit: "本", pkgSize: 1, pkgUnit: "本", category: "kitchen", max: 3, price: 0 },
  { name: "ゴミ袋", unit: "枚", pkgSize: 30, pkgUnit: "パック", category: "cleaning", max: 60, price: 0 },
  { name: "洗濯洗剤", unit: "本", pkgSize: 1, pkgUnit: "本", category: "cleaning", max: 3, price: 0 },
  { name: "食器用洗剤", unit: "本", pkgSize: 1, pkgUnit: "本", category: "kitchen", max: 3, price: 0 },
  { name: "シャンプー", unit: "本", pkgSize: 1, pkgUnit: "本", category: "toilet", max: 2, price: 0 },
  { name: "ボディソープ", unit: "本", pkgSize: 1, pkgUnit: "本", category: "toilet", max: 2, price: 0 },
];

const STORAGE_KEY = "stock_app_v2";

let state = {
  items: [],
  tab: "stock",
  showModal: false,
  editIdx: null,
  buyIdx: null
};

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) { state.items = JSON.parse(s); return; }
  } catch(e) {}
  state.items = [
    { name: "トイレットペーパー", unit: "ロール", pkgSize: 12, pkgUnit: "パック", category: "toilet", qty: 8, max: 24, price: 42 },
    { name: "ティッシュペーパー", unit: "箱", pkgSize: 5, pkgUnit: "パック", category: "toilet", qty: 3, max: 10, price: 76 },
    { name: "食パン", unit: "枚", pkgSize: 6, pkgUnit: "斤", category: "food", qty: 4, max: 12, price: 25 },
    { name: "キッチンペーパー", unit: "ロール", pkgSize: 4, pkgUnit: "パック", category: "kitchen", qty: 2, max: 8, price: 75 },
    { name: "ゴミ袋", unit: "枚", pkgSize: 30, pkgUnit: "パック", category: "cleaning", qty: 15, max: 60, price: 7 },
    { name: "洗濯洗剤", unit: "本", pkgSize: 1, pkgUnit: "本", category: "cleaning", qty: 1, max: 3, price: 398 },
  ];
  saveState();
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state.items));
}

function getStatus(item) {
  const r = item.qty / item.max;
  if (r <= 0) return { label: "在庫切れ", cls: "badge-out" };
  if (r <= 0.25) return { label: "残りわずか", cls: "badge-low" };
  if (r <= 0.6) return { label: "適量", cls: "badge-ok" };
  return { label: "十分", cls: "badge-plenty" };
}

function getBarColor(item) {
  const r = item.qty / item.max;
  if (r <= 0) return "#e8709a";
  if (r <= 0.25) return "#eba0c0";
  if (r <= 0.6) return "#d4a0d8";
  return "#f0b0c8";
}

function pkgInfo(item) {
  if (item.pkgSize <= 1) return "";
  const pkgs = Math.floor(item.qty / item.pkgSize);
  const rem = item.qty % item.pkgSize;
  if (pkgs === 0) return rem + item.unit;
  if (rem === 0) return pkgs + item.pkgUnit;
  return pkgs + item.pkgUnit + " + " + rem + item.unit;
}

function render() {
  const app = document.getElementById("app");
  let h = "";

  h += '<div class="header"><h1><i class="ti ti-home" aria-hidden="true" style="font-size:22px;margin-right:6px;vertical-align:-2px"></i>ストック管理</h1></div>';
  h += '<div class="tabs">';
  h += '<div class="tab ' + (state.tab === "stock" ? "active" : "") + '" onclick="switchTab(\'stock\')"><i class="ti ti-package" aria-hidden="true" style="font-size:15px;margin-right:4px;vertical-align:-1px"></i>在庫一覧</div>';
  h += '<div class="tab ' + (state.tab === "shop" ? "active" : "") + '" onclick="switchTab(\'shop\')"><i class="ti ti-shopping-cart" aria-hidden="true" style="font-size:15px;margin-right:4px;vertical-align:-1px"></i>買い物リスト</div>';
  h += '</div>';

  if (state.tab === "stock") {
    var grouped = {};
    state.items.forEach(function(item, i) {
      var cat = item.category || "other";
      if (!grouped[cat]) grouped[cat] = [];
      grouped[cat].push({ name: item.name, unit: item.unit, pkgSize: item.pkgSize, pkgUnit: item.pkgUnit, category: item.category, qty: item.qty, max: item.max, price: item.price || 0, idx: i });
    });

    var catOrder = ["food", "kitchen", "toilet", "cleaning", "other"];
    catOrder.forEach(function(cat) {
      if (!grouped[cat]) return;
      h += '<div class="category-label">' + CATEGORIES[cat] + '</div>';
      grouped[cat].forEach(function(item) {
        var st = getStatus(item);
        var pct = Math.min(100, Math.round((item.qty / item.max) * 100));
        var bc = getBarColor(item);
        var pkg = pkgInfo(item);
        h += '<div class="item-card">';
        h += '<div class="item-top">';
        h += '<span class="item-name">' + item.name + '</span>';
        h += '<div style="display:flex;align-items:center;gap:6px;">';
        h += '<span class="item-badge ' + st.cls + '">' + st.label + '</span>';
        h += '<button class="delete-btn" onclick="deleteItem(' + item.idx + ')" aria-label="削除"><i class="ti ti-x" aria-hidden="true"></i></button>';
        h += '</div></div>';
        h += '<div class="item-controls">';
        h += '<button class="btn-round" onclick="changeQty(' + item.idx + ',-1)" aria-label="減らす"><i class="ti ti-minus" aria-hidden="true"></i></button>';
        h += '<div class="qty-display">';
        h += '<span class="qty-num">' + item.qty + '</span>';
        h += '<span class="qty-unit">' + item.unit + '</span>';
        if (pkg) h += '<span class="qty-sub">(' + pkg + ')</span>';
        h += '</div>';
        h += '<button class="btn-round" onclick="changeQty(' + item.idx + ',1)" aria-label="増やす"><i class="ti ti-plus" aria-hidden="true"></i></button>';
        if (item.pkgSize > 1) {
          h += '<button class="pkg-btn" onclick="changeQty(' + item.idx + ',' + item.pkgSize + ')" aria-label="1' + item.pkgUnit + '追加">+1' + item.pkgUnit + '</button>';
        }
        h += '<button class="buy-btn" onclick="toggleBuy(' + item.idx + ')"><i class="ti ti-shopping-cart" aria-hidden="true" style="font-size:13px"></i>購入追加</button>';
        h += '</div>';
        var pr = item.price || 0;
        if (pr > 0) {
          var total = pr * item.qty;
          h += '<div class="item-price"><i class="ti ti-coin" aria-hidden="true" style="font-size:14px"></i>';
          h += '<span>' + pr.toLocaleString() + '円</span>/' + item.unit;
          h += '<span style="margin-left:auto;color:var(--text-tertiary);font-weight:400">在庫合計 <span style="font-weight:600;color:var(--text-secondary)">' + total.toLocaleString() + '円</span></span>';
          h += '</div>';
        }
        if (state.buyIdx === item.idx) {
          h += '<div class="buy-modal">';
          h += '<div class="field-row">';
          h += '<div class="field"><label>購入価格（円）</label><input id="b-price" type="number" min="0" placeholder="例: 500" oninput="previewBuy(' + item.idx + ')"></div>';
          h += '<div class="field"><label>購入個数</label><input id="b-qty" type="number" min="1" placeholder="例: 12" oninput="previewBuy(' + item.idx + ')"></div>';
          h += '</div>';
          h += '<div class="buy-preview" id="buy-preview"></div>';
          h += '<div class="buy-actions">';
          h += '<button class="btn-cancel" onclick="state.buyIdx=null;render()">キャンセル</button>';
          h += '<button class="btn-save" onclick="applyBuy(' + item.idx + ')">追加</button>';
          h += '</div></div>';
        }
        h += '<div class="bar-row"><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + bc + '"></div></div>';
        h += '<span class="bar-pct">' + pct + '%</span></div>';
        h += '</div>';
      });
    });

    h += '<button class="add-btn" onclick="openAdd()"><i class="ti ti-plus" aria-hidden="true"></i> アイテムを追加</button>';

  } else {
    var lowItems = state.items.filter(function(it) {
      return (it.qty / it.max) <= 0.25;
    }).sort(function(a, b) { return (a.qty / a.max) - (b.qty / b.max); });

    if (lowItems.length === 0) {
      h += '<div class="empty-state"><i class="ti ti-check" aria-hidden="true"></i>買い足すものはありません</div>';
    } else {
      h += '<div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px">' + lowItems.length + '件の買い足し候補</div>';
      lowItems.forEach(function(item) {
        var need = item.max - item.qty;
        var pkgsNeeded = item.pkgSize > 1 ? Math.ceil(need / item.pkgSize) : need;
        var buyUnit = item.pkgSize > 1 ? item.pkgUnit : item.unit;
        var st = getStatus(item);
        var iconCls = st.cls === "badge-out" ? "si-icon-danger" : "si-icon-warn";
        h += '<div class="shopping-item">';
        h += '<i class="ti ti-alert-triangle si-icon ' + iconCls + '" aria-hidden="true"></i>';
        h += '<span class="si-name">' + item.name + '</span>';
        h += '<span class="si-note">' + pkgsNeeded + buyUnit + 'あると安心</span>';
        h += '</div>';
      });
    }
  }

  if (state.showModal) {
    var isEdit = state.editIdx !== null;
    var ei = isEdit ? state.items[state.editIdx] : null;
    h += '<div class="modal-overlay" onclick="closeModal(event)">';
    h += '<div class="modal" onclick="event.stopPropagation()">';
    h += '<h2>' + (isEdit ? "アイテム編集" : "アイテム追加") + '</h2>';
    h += '<div class="field"><label>プリセット</label><select id="f-preset" onchange="applyPreset()">';
    h += '<option value="">選択してください...</option>';
    PRESETS.forEach(function(p, i) {
      h += '<option value="' + i + '">' + p.name + ' (' + p.pkgSize + p.unit + '/' + p.pkgUnit + ')</option>';
    });
    h += '</select></div>';
    h += '<div class="field"><label>アイテム名</label><input id="f-name" type="text" placeholder="例: トイレットペーパー" value="' + (ei ? ei.name : '') + '"></div>';
    h += '<div class="field-row">';
    h += '<div class="field"><label>単位</label><input id="f-unit" type="text" placeholder="例: ロール" value="' + (ei ? ei.unit : '') + '"></div>';
    h += '<div class="field"><label>カテゴリ</label><select id="f-cat">';
    Object.keys(CATEGORIES).forEach(function(k) {
      h += '<option value="' + k + '"' + (ei && ei.category === k ? ' selected' : '') + '>' + CATEGORIES[k] + '</option>';
    });
    h += '</select></div></div>';
    h += '<div class="field-row">';
    h += '<div class="field"><label>1包装あたりの個数</label><input id="f-pkg" type="number" min="1" value="' + (ei ? ei.pkgSize : 1) + '"></div>';
    h += '<div class="field"><label>包装の単位</label><input id="f-pkgunit" type="text" placeholder="例: パック" value="' + (ei ? ei.pkgUnit : '個') + '"></div>';
    h += '</div>';
    h += '<div class="field-row">';
    h += '<div class="field"><label>購入価格（円）</label><input id="f-buyprice" type="number" min="0" placeholder="例: 500" value="' + (ei && ei.buyPrice ? ei.buyPrice : '') + '" oninput="calcUnitPrice()"></div>';
    h += '<div class="field"><label>購入個数</label><input id="f-buyqty" type="number" min="1" placeholder="例: 12" value="' + (ei && ei.buyQty ? ei.buyQty : '') + '" oninput="calcUnitPrice()"></div>';
    h += '</div>';
    h += '<div id="f-unitprice-display" style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;padding-left:2px"></div>';
    h += '<div class="field-row">';
    h += '<div class="field"><label>現在の在庫数</label><input id="f-qty" type="number" min="0" value="' + (ei ? ei.qty : 0) + '"></div>';
    h += '<div class="field"><label>最大ストック数</label><input id="f-max" type="number" min="1" value="' + (ei ? ei.max : 10) + '"></div>';
    h += '</div>';
    h += '<div class="modal-actions">';
    h += '<button class="btn-cancel" onclick="state.showModal=false;state.editIdx=null;render()">キャンセル</button>';
    h += '<button class="btn-save" onclick="saveItem()">保存</button>';
    h += '</div></div></div>';
  }

  app.innerHTML = h;
  if (state.showModal) {
    setTimeout(function() { if (typeof calcUnitPrice === 'function') calcUnitPrice(); }, 0);
  }
}

window.switchTab = function(t) { state.tab = t; render(); };

window.toggleBuy = function(idx) {
  state.buyIdx = (state.buyIdx === idx) ? null : idx;
  render();
};

window.previewBuy = function(idx) {
  var bp = parseInt(document.getElementById("b-price").value) || 0;
  var bq = parseInt(document.getElementById("b-qty").value) || 0;
  var el = document.getElementById("buy-preview");
  if (bp <= 0 || bq <= 0) { el.textContent = ''; return; }
  var item = state.items[idx];
  var newUnitPrice = Math.round(bp / bq);
  var oldPrice = item.price || 0;
  var oldQty = item.qty;
  var avgPrice;
  if (oldPrice > 0 && oldQty > 0) {
    avgPrice = Math.round((oldQty * oldPrice + bp) / (oldQty + bq));
  } else {
    avgPrice = newUnitPrice;
  }
  el.innerHTML = '今回: <strong>' + newUnitPrice.toLocaleString() + '円</strong>/' + item.unit
    + ' → 平均: <strong>' + avgPrice.toLocaleString() + '円</strong>/' + item.unit;
};

window.applyBuy = function(idx) {
  var bp = parseInt(document.getElementById("b-price").value) || 0;
  var bq = parseInt(document.getElementById("b-qty").value) || 0;
  if (bp <= 0 || bq <= 0) { alert("購入価格と個数を入力してください"); return; }
  var item = state.items[idx];
  var oldPrice = item.price || 0;
  var oldQty = item.qty;
  if (oldPrice > 0 && oldQty > 0) {
    item.price = Math.round((oldQty * oldPrice + bp) / (oldQty + bq));
  } else {
    item.price = Math.round(bp / bq);
  }
  item.qty = Math.min(item.max, oldQty + bq);
  item.buyPrice = bp;
  item.buyQty = bq;
  state.buyIdx = null;
  saveState();
  render();
};

window.changeQty = function(idx, d) {
  state.items[idx].qty = Math.max(0, Math.min(state.items[idx].max, state.items[idx].qty + d));
  saveState();
  render();
};

window.deleteItem = function(idx) {
  if (confirm(state.items[idx].name + " を削除しますか？")) {
    state.items.splice(idx, 1);
    saveState();
    render();
  }
};

window.openAdd = function() {
  state.showModal = true;
  state.editIdx = null;
  render();
};

window.closeModal = function(e) {
  if (e.target.classList.contains("modal-overlay")) {
    state.showModal = false;
    state.editIdx = null;
    render();
  }
};

window.applyPreset = function() {
  var sel = document.getElementById("f-preset").value;
  if (sel === "") return;
  var p = PRESETS[parseInt(sel)];
  document.getElementById("f-name").value = p.name;
  document.getElementById("f-unit").value = p.unit;
  document.getElementById("f-pkg").value = p.pkgSize;
  document.getElementById("f-pkgunit").value = p.pkgUnit;
  document.getElementById("f-max").value = p.max;
  document.getElementById("f-cat").value = p.category;
  document.getElementById("f-buyprice").value = '';
  document.getElementById("f-buyqty").value = p.pkgSize;
  calcUnitPrice();
};

function calcUnitPriceValue() {
  var bp = parseInt(document.getElementById("f-buyprice").value) || 0;
  var bq = parseInt(document.getElementById("f-buyqty").value) || 1;
  if (bp <= 0 || bq <= 0) return 0;
  return Math.round(bp / bq);
}

window.calcUnitPrice = function() {
  var el = document.getElementById("f-unitprice-display");
  var p = calcUnitPriceValue();
  if (p > 0) {
    el.innerHTML = '<i class="ti ti-arrow-right" aria-hidden="true" style="font-size:13px;vertical-align:-1px;margin-right:4px"></i>1個あたり <strong>' + p.toLocaleString() + '円</strong>';
  } else {
    el.textContent = '';
  }
};

window.saveItem = function() {
  var name = document.getElementById("f-name").value.trim();
  if (!name) { alert("アイテム名を入力してください"); return; }
  var item = {
    name: name,
    unit: document.getElementById("f-unit").value.trim() || "個",
    pkgSize: Math.max(1, parseInt(document.getElementById("f-pkg").value) || 1),
    pkgUnit: document.getElementById("f-pkgunit").value.trim() || "個",
    category: document.getElementById("f-cat").value,
    buyPrice: Math.max(0, parseInt(document.getElementById("f-buyprice").value) || 0),
    buyQty: Math.max(1, parseInt(document.getElementById("f-buyqty").value) || 1),
    price: calcUnitPriceValue(),
    qty: Math.max(0, parseInt(document.getElementById("f-qty").value) || 0),
    max: Math.max(1, parseInt(document.getElementById("f-max").value) || 10),
  };
  if (state.editIdx !== null) {
    state.items[state.editIdx] = item;
  } else {
    state.items.push(item);
  }
  state.showModal = false;
  state.editIdx = null;
  saveState();
  render();
};

loadState();
render();
</script>
</body>
</html>
